# Skyramp Workspace Configuration
workspace:
  repoName: nkravec/openobserve
  repoUrl: https://github.com/nkravec/openobserve
metadata:
  schemaVersion: v1
  executorVersion: v1.3.34
  createdAt: "2026-07-14T18:46:30.762Z"
  updatedAt: "2026-07-14T18:46:30.768Z"
services:
  - serviceName: openobserve-backend
    language: python
    framework: pytest
    testDirectory: tests/api-testing
    api:
      schemaPath: http://localhost:5080/api-doc/openapi.json
      authType: basic
      authHeader: Authorization
      authScheme: Basic
      baseUrl: http://localhost:5080
    runtimeDetails:
      runtime: docker
      dockerNetwork: host
  - serviceName: openobserve-web
    language: typescript
    framework: playwright
    testDirectory: tests/ui-testing/playwright-tests
    api:
      authType: none
      authHeader: ""
      baseUrl: http://localhost:5080/web
    runtimeDetails:
      runtime: docker
      dockerNetwork: host
